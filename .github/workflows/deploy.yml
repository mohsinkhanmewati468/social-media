name: CI/CD - Social Media Microservices

on:
  push:
    branches:
      - master

env:
  # Opt into Node.js 24 to resolve deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 (Supports newer Node runtimes)
      - name: Checkout code
        uses: actions/checkout@v4

      # Updated to v3 (Latest stable for Docker Login)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          services=(api-gateway identity-service post-service media-service search-service)
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t ${{ secrets.DOCKER_USERNAME }}/$service:latest ./$service
            echo "Pushing $service..."
            docker push ${{ secrets.DOCKER_USERNAME }}/$service:latest
          done

      - name: SSH to EC2 & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/social-media
            docker compose pull
            docker compose up -d --build
            docker system prune -f
