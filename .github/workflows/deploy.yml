name: CI/CD - Social Media Microservices

on:
  push:
    branches:
      - main # trigger only on main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest ./api-gateway
          docker build -t ${{ secrets.DOCKER_USERNAME }}/identity-service:latest ./identity-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/post-service:latest ./post-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/media-service:latest ./media-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/search-service:latest ./search-service

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/identity-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/post-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/media-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/search-service:latest

      - name: SSH to EC2 & Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/social-media
            docker compose pull
            docker compose up -d --build
