name: CI/CD - Social Media Microservices

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          set -e
          services=(api-gateway identity-service post-service media-service search-service)
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/$service:latest ./$service
            echo "Pushing $service..."
            docker push ${{ secrets.DOCKER_USERNAME }}/$service:latest
          done

      - name: SSH to EC2 & Deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/social-media
            echo "Pulling latest images..."
            docker compose pull
            echo "Recreating containers..."
            docker compose up -d --build
            echo "Cleaning unused Docker objects..."
            docker system prune -f
            echo "Deployment finished successfully."
