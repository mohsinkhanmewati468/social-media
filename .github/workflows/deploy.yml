name: CI/CD - Social Media Microservices

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # checkout@v4 works, but v5 might have better Node support
      - name: Checkout code
        uses: actions/checkout@v4 # v4 is still stable, v5 may have breaking changes

      # docker/login-action v3 works with Node 24 via env var
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # setup-buildx-action v3 works with Node 24 via env var
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # cache v4 is the latest stable version
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and Push Docker Images
        run: |
          services=(api-gateway identity-service post-service media-service search-service)
          for service in "${services[@]}"; do
            docker buildx build \
              --cache-from=type=local,src=/tmp/.buildx-cache \
              --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
              --tag ${{ secrets.DOCKER_USERNAME }}/$service:latest \
              --tag ${{ secrets.DOCKER_USERNAME }}/$service:${{ github.sha }} \
              --push \
              ./$service
          done

          # Move cache
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
