name: CI/CD - Social Media Microservices

on:
  push:
    branches:
      - master # trigger only on master branch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # use Node.js 24 for all JS-based actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2.20.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build and push all Docker images in a loop
      - name: Build and Push Docker Images
        run: |
          services=(api-gateway identity-service post-service media-service search-service)
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t ${{ secrets.DOCKER_USERNAME }}/$service:latest ./$service
            echo "Pushing $service..."
            docker push ${{ secrets.DOCKER_USERNAME }}/$service:latest
          done

      # 4️⃣ SSH to EC2 & Deploy
      - name: SSH to EC2 & Deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/social-media
            docker compose pull
            docker compose up -d --build
            docker system prune -f  # optional: clean unused images to save space
