name: CI/CD - Social Media Microservices

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo using the latest checkout action
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Docker Hub using the latest docker/login-action
      - name: Log in to Docker Hub
        uses: docker/login-action@v2.5.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker images
      - name: Build and Push Docker Images
        run: |
          services=(api-gateway identity-service post-service media-service search-service)
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t ${{ secrets.DOCKER_USERNAME }}/$service:latest ./$service
            echo "Pushing $service..."
            docker push ${{ secrets.DOCKER_USERNAME }}/$service:latest
          done

      # SSH to EC2 and deploy
      - name: SSH to EC2 & Deploy
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/social-media
            docker compose pull
            docker compose up -d --build
            docker system prune -f
