name: CI/CD - Social Media Microservices
on:
  push:
    branches:
      - master

# Global environment variable to opt into Node 24 early
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Use latest v4 or v5 if available to support Node 24
      - name: Checkout code
        uses: actions/checkout@v4

      # Ensure you are on v3 for the login action
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          services=(api-gateway identity-service post-service media-service search-service)
          for service in "${services[@]}"; do
            docker build -t ${{ secrets.DOCKER_USERNAME }}/$service:latest ./$service
            docker push ${{ secrets.DOCKER_USERNAME }}/$service:latest
          done

      - name: SSH to EC2 & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/social-media
            docker compose pull
            docker compose up -d --build
            docker system prune -f
